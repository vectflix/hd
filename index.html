<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Milan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="bg-music" src="Kali Uchis - I Wish you Roses (Official Music Video).mp3" loop></audio>

  <div class="bg-glows">
    <div class="glow pink"></div>
    <div class="glow purple"></div>
  </div>

  <div class="container">
    <button id="music-toggle" class="music-btn">▶ Play Music</button>

    <main class="card">
      <header class="card-header">
        <h1>Happy Birthday, <span class="gradient-text">Milan!</span></h1>
        <p class="subtitle">wish u roses 🌹</p>
      </header>

      <div class="card-body">
        <button id="open-card-btn" class="action-btn">Open Note ✉️</button>
        
        <div id="note-message" class="note hidden">
          <p>Hey Milan!</p>
          <p>Even though we don't know each other that well, I wanted to put this together to celebrate your day.</p>
          <p>Hope your year is full of amazing energy and great music. Enjoy it to the absolute fullest! 🥂</p>
          <button id="close-card-btn" class="close-btn">Close Note</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
